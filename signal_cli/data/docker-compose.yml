version: "3.8"

services:
  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-cli
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # MODE controls how signal-cli is executed inside the container.
      # Default is 'json-rpc' (long-lived JVM daemon) for best performance and
      # lower steady-state resource use after the device is linked.
      #
      # Other supported values (from upstream signal-cli-rest-api):
      #   - json-rpc          : long-lived JVM daemon (default; fastest, higher memory)
      #   - json-rpc-native   : long-lived native binary daemon
      #   - native            : GraalVM native binary (good linking compatibility)
      #   - normal            : spawns JVM per request (slowest, upstream default)
      #
      # If you encounter 'UnsupportedOperationException' or linking problems,
      # temporarily change to MODE=native (or normal), then re-run your link/setup
      # command (it force-recreates the container). You can switch back to json-rpc
      # after the phone is successfully linked.
      - MODE=json-rpc
    volumes:
      - ${HOME}/.signal-cli/signal-data:/home/.local/share/signal-cli
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
